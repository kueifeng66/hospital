<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Queue Monitor</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #1e293b;
            margin: 0;
            transition: background-color 0.2s ease;
        }
        .display-container {
            text-align: center;
            color: white;
        }
        h1 {
            font-size: 1.5rem;
            color: #94a3b8;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            margin-bottom: 0;
        }
        .live-number {
            font-size: 10rem;
            font-weight: 900;
            color: #38bdf8;
            line-height: 1;
            margin: 1rem 0;
            text-shadow: 0 0 30px rgba(56, 189, 248, 0.2);
            transition: transform 0.1s ease;
        }
        .status-tag {
            background-color: #334155;
            color: #38bdf8;
            padding: 0.5rem 1rem;
            border-radius: 9999px;
            font-size: 0.85rem;
            font-weight: 600;
            display: inline-block;
        }
        /* Visual flash effect when number shifts */
        body.flash {
            background-color: #064e3b;
        }
        body.flash .live-number {
            color: #34d399;
            transform: scale(1.05);
        }
    </style>
</head>
<body>

    <div class="display-container">
        <h1>Current Number</h1>
        <div class="live-number" id="number">--</div>
        <div class="status-tag">● Real-time Connection Active</div>
		<div class="audio-notice" id="audio-status">⚠️ Tap anywhere to enable sound alerts</div>
    </div>
    <audio id="queueSound" src="bell.mp3" loop preload="auto"></audio>
    <!-- Firebase SDK Modules -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-database.js";

        // Your Firebase Configuration
        const firebaseConfig = {
            apiKey: "AIzaSyAir-SJKaxT9ay7ybpe33pQDO9_ddqSvKk",
            authDomain: "hospital-89fff.firebaseapp.com",
            databaseURL: "https://hospital-89fff-default-rtdb.firebaseio.com",
            projectId: "hospital-89fff",
            storageBucket: "hospital-89fff.firebasestorage.app",
            messagingSenderId: "566396718607",
            appId: "1:566396718607:web:42df4eeb5673ea6b549d7a",
            measurementId: "G-RQ6M1F9GJ9"
        };

        // Initialize Firebase
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const queueRef = ref(db, 'queue/currentNumber');

        const numberEl = document.getElementById("number");
        const bodyEl = document.body;
        let isFirstLoad = true;
        const sound = document.getElementById("queueSound");
        // Real-time update stream listener
        onValue(queueRef, (snapshot) => {
            const newNumber = snapshot.val() !== null ? snapshot.val() : 0;
            
            // Only flash if it's an actual change, not the initial page load
            if (!isFirstLoad && numberEl.innerText !== String(newNumber)) {
                triggerFlash();
            }
            
            numberEl.innerText = newNumber;
            isFirstLoad = false;
        });

        function triggerFlash() {
            bodyEl.classList.add("flash");
            // Restart sound
            sound.currentTime = 0;

           // Play sound
            sound.play().catch(err => {
                console.warn("Audio play blocked because user hasn't clicked the page yet:", err);
            });

           // Stop after 5 seconds
           setTimeout(() => {
              sound.pause();
              sound.currentTime = 0;
           }, 5000);
            setTimeout(() => {
                bodyEl.classList.remove("flash");
            }, 250); // Flash lasts 250ms
        }
    </script>
</body>
</html>
